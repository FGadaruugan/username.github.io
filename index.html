<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mobile📱</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial,sans-serif;
  overflow:hidden;

  background:linear-gradient(135deg,
    #ff6f00,
    #ffb199,
    #1da1f2,
    #0f2027);
}

/* CARD */
.box{
  width:50%; /* % ашигласан */
  
  padding:5%;
  border-radius:8%;

  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(15px);

  text-align:center;

  border:1px solid rgba(255,255,255,0.2);
}

h1{
  margin:0;
  font-size:6vw; /* дэлгэцээс хамаарч жижиг */
  color:white;
}

p{
  color:white;
  font-size:3.5vw;
}

.btn{
  width:100%;
  padding:4%;
  margin-top:4%;

  border:none;
  border-radius:5%;

  color:white;
  font-size:3.5vw;
  font-weight:bold;
}

.fb{
  background:linear-gradient(90deg,#1877f2,#00e5ff);
}

.yt{
  background:linear-gradient(90deg,#ff6f00,#ff3d00);
}
</style>
</head>

<body>

<div class="box">

<h1>Сайн уу 👋</h1>
<p>Миний social хаягууд</p>

<button class="btn fb"
onclick="window.location.href='https://www.facebook.com/share/1ETGM5C4Vz/'">
📘 Facebook
</button>

<button class="btn yt"
onclick="window.location.href='https://www.youtube.com/@Badar-Uugan23_mlbb'">
▶ YouTube
</button>

</div>

</body>
</html>
