<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Minecraft Mobile</title>

<style>
body {
  margin: 0;
  background: #87CEEB;
  text-align: center;
  font-family: Arial;
}

canvas {
  background: #bde0fe;
  border: 2px solid black;
  display: block;
  margin: auto;
}

/* control buttons */
.controls {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

button {
  width: 60px;
  height: 60px;
  font-size: 20px;
  margin: 5px;
}
</style>
</head>

<body>

<canvas id="game" width="400" height="400"></canvas>

<<div style="
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: grid;
  grid-template-columns: 60px 60px 60px;
  grid-template-rows: 60px 60px;
  gap: 5px;
">

  <div></div>

  <button onclick="player.y -= 10">⬆️</button>

  <div></div>

  <button onclick="player.x -= 10">⬅️</button>

  <button onclick="placeBlock()">🧱</button>

  <button onclick="player.x += 10">➡️</button>

  <div></div>

  <button onclick="player.y += 10">⬇️</button>

  <div></div>

</div>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// player
let player = { x: 50, y: 50, size: 20 };

// blocks (Minecraft world)
let blocks = [];

// movement
function moveLeft()  { player.x -= 10; }
function moveRight() { player.x += 10; }
function moveUp()    { player.y -= 10; }
function moveDown()  { player.y += 10; }

// place block
function placeBlock() {
  blocks.push({ x: player.x, y: player.y + 20 });
}

// draw game
function draw() {
  ctx.clearRect(0, 0, 400, 400);

  // ground
  ctx.fillStyle = "brown";
  for (let i = 0; i < 400; i += 20) {
    ctx.fillRect(i, 380, 20, 20);
  }

  // blocks
  ctx.fillStyle = "gray";
  for (let b of blocks) {
    ctx.fillRect(b.x, b.y, 20, 20);
  }

  // player
  ctx.fillStyle = "green";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>  </style>
</head>
